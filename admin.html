<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>UDCA - DOCUSALUT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand text-warning"><i class="fa-solid fa-users-gear me-2"></i> Panell UDCA</span>
            <a href="index.html" class="btn btn-outline-light btn-sm">Tornar a la Web</a>
        </div>
    </nav>

    <main class="container view-section">
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="card shadow-sm border-0"><div class="card-body d-flex gap-2">
                    <input type="text" id="searchSip" class="form-control" placeholder="Cercar per SIP...">
                    <button class="btn btn-secondary" onclick="renderAdminTable()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div></div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-hospital-secondary text-white h-100"><div class="card-body">
                    <h6>Mitjana Satisfacció</h6>
                    <h3 id="surveyStats">0 / 5 <i class="fa-solid fa-star text-warning"></i></h3>
                </div></div>
            </div>
        </div>

        <div class="card shadow-sm border-0"><div class="card-body"><div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead><tr><th>Data</th><th>Pacient (SIP)</th><th>Tipus Document</th><th>Estat</th><th>Accions</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div></div></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
