<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Espai Pacient - DOCUSALUT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<a href="admin.html" class="btn btn-warning shadow-lg position-fixed bottom-0 end-0 m-4 fw-bold" style="z-index: 1050; border-radius: 50px; transition: transform 0.3s;">
    <i class="fa-solid fa-user-shield me-2"></i> Accés directe UDCA (Demo)
</a>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-hospital-primary shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand"><i class="fa-solid fa-user me-2"></i> El Meu Espai de Salut</span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Tancar Sessió</button>
        </div>
    </nav>

    <main class="container view-section">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white pt-4 pb-0"><h5 class="card-title">Nova Sol·licitud</h5></div>
                    <div class="card-body">
                        <form id="requestForm">
                            <div class="mb-2"><input type="text" id="reqName" class="form-control" placeholder="Nom Complet" required></div>
                            <div class="mb-2"><input type="text" id="reqSip" class="form-control" readonly></div>
                            <div class="mb-2"><input type="email" id="reqEmail" class="form-control" placeholder="Correu electrònic" required></div>
                            <div class="mb-2">
                                <select id="reqType" class="form-select" required>
                                    <option value="Informe Clínic">Informe Clínic</option>
                                    <option value="Certificat Mèdic">Certificat Mèdic</option>
                                    <option value="Justificant d'Assistència">Justificant d'Assistència</option>
                                </select>
                            </div>
                            <div class="mb-3"><textarea id="reqReason" class="form-control" placeholder="Motiu" required></textarea></div>
                            <button type="submit" class="btn btn-hospital-primary w-100">Enviar Sol·licitud</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white pt-4 pb-0"><h5>Historial</h5></div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead><tr><th>Data</th><th>Document</th><th>Estat</th><th>Accions</th></tr></thead>
                                <tbody id="patientTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="surveyModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content"><div class="modal-body">
            <h5 class="mb-3">Enquesta de Satisfacció</h5>
            <form id="surveyForm">
                <input type="range" class="form-range mb-3" min="1" max="5" id="surveyUsability" value="5">
                <input type="range" class="form-range mb-3" min="1" max="5" id="surveySecurity" value="5">
                <button type="submit" class="btn btn-success w-100">Enviar Valoració</button>
            </form>
        </div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
