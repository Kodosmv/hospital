<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accés - DOCUSALUT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-hospital-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="fa-solid fa-house-medical fa-2x me-2"></i>
                <div>
                    <h1 class="h5 mb-0">DOCUSALUT</h1>
                    <small class="d-block" style="font-size: 0.7rem;">Hospital Verge dels Lliris</small>
                </div>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fa-solid fa-arrow-left"></i> Tornar a l'Inici</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 view-section">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0 overflow-hidden">
                    <div class="row g-0">
                        <div class="col-md-6 p-5 bg-white">
                            <h4 class="text-hospital-primary mb-4"><i class="fa-solid fa-notes-medical me-2"></i>Accés amb SIP</h4>
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-bold">Número SIP</label>
                                    <input type="text" class="form-control bg-light" id="loginSip" required placeholder="Ex: 12345678">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted small fw-bold">DNI / NIE</label>
                                    <input type="text" class="form-control bg-light" id="loginDni" required placeholder="Ex: 12345678A">
                                </div>
                                <button type="submit" class="btn btn-hospital-primary w-100 py-2">Entrar <i class="fa-solid fa-sign-in-alt ms-1"></i></button>
                            </form>
                        </div>
                        
                        <div class="col-md-6 p-5 bg-light border-start">
                            <h4 class="text-hospital-primary mb-4"><i class="fa-solid fa-id-card-clip me-2"></i>Accés Electrònic</h4>
                            <p class="text-muted small mb-4">Accedix de forma segura mitjançant els sistemes d'identificació de les Administracions Públiques.</p>
                            
                            <div class="d-grid gap-3">
                                <button type="button" class="btn btn-outline-danger py-2 d-flex align-items-center justify-content-center" onclick="simularLoginEspecial('Cl@ve')">
                                    <img src="https://administracionelectronica.gob.es/pae_Home/dms/pae_Home/documentos/Estrategia/pae_Identidad_Electronica/Logo-Clave.png" alt="Cl@ve" style="height: 20px;" class="me-2">
                                    Identificació amb Cl@ve
                                </button>
                                
                                <button type="button" class="btn btn-outline-primary py-2 d-flex align-items-center justify-content-center" onclick="simularLoginEspecial('DNIe')">
                                    <i class="fa-solid fa-certificate fs-5 me-2"></i>
                                    Certificat Digital o DNIe
                                </button>
                            </div>
                            
                            <div class="mt-4 text-center">
                                <a href="#" class="text-decoration-none small text-muted"><i class="fa-solid fa-circle-question"></i> Problemes per accedir?</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <a href="admin.html" class="btn btn-warning shadow-lg position-fixed bottom-0 end-0 m-4 fw-bold" style="z-index: 1050; border-radius: 50px;">
        <i class="fa-solid fa-user-shield me-2"></i> Accés UDCA (Demo)
    </a>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
