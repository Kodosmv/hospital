<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accés - DOCUSALUT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-hospital-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="fa-solid fa-house-medical fa-2x me-2"></i>
                <div>
                    <h1 class="h5 mb-0">DOCUSALUT</h1>
                    <small class="d-block" style="font-size: 0.7rem;">Hospital Verge dels Lliris</small>
                </div>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Tornar a l'Inici</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 view-section">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <h3 class="text-center text-hospital-primary mb-4">Accés Pacients</h3>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Número SIP</label>
                                <input type="text" class="form-control" id="loginSip" required placeholder="Ex: 12345678">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">DNI / NIE</label>
                                <input type="text" class="form-control" id="loginDni" required placeholder="Ex: 12345678A">
                            </div>
                            <button type="submit" class="btn btn-hospital-primary w-100">Entrar <i class="fa-solid fa-sign-in-alt"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
